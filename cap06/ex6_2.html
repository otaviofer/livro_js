<!DOCTYPE html>

<!-- Programa Descubra no número -->
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <title>Exercício 6.2</title>
</head>
<body>
    <h1> Descubra o número </h1>
    <form>
        <p>Número:
            <input type="number" min="1" max="100" id="inNumero" required autofocus>
            <input type="submit" value="Apostar" id="btSubmit">
            <input type="button" id="btNovo" class="oculta" value="Jogar Novamente">
        </p>
    </form>
    <h3>Erros: <span id="outErros"></span></h3>
    <h3>Chances: <span id="outChances"></span></h3>
    <h3 id="outDica" class="italico">Dica: É um número entre 1 e 100</h3>
    <script src="js/ex6_2.js"></script>
</body>
</html>
